- name: Setup Node.js
  uses: actions/setup-node@v4
  with:
    node-version: '20'
    cache: 'npm'
    cache-dependency-path: crates/strex-ui/frontend/package-lock.json

- name: Install frontend dependencies
  run: cd crates/strex-ui/frontend && npm ci

- name: Build frontend
  run: cd crates/strex-ui/frontend && npm run build
