- name: Setup Node.js
  uses: actions/setup-node@v4
  with:
    node-version: '20'
    cache: 'npm'
    cache-dependency-path: crates/strex-ui/frontend/package-lock.json

- name: Install frontend dependencies
  run: npm ci
  working-directory: crates/strex-ui/frontend

- name: Build frontend
  run: npm run build
  working-directory: crates/strex-ui/frontend
